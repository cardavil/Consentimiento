<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auditoría | Consentia Admin</title>
  <link rel="stylesheet" href="../../css/tokens.css">
  <link rel="stylesheet" href="../../css/componentes.css">
</head>
<body class="pagina-app">
  <a href="#main" class="skip-link">Ir al contenido</a>
  <div class="marca-barra"></div>
  <header id="app-header" class="app-header"></header>
  <nav id="admin-tabs" class="admin-tabs"></nav>

    <main id="main" class="admin-content">
      <div class="admin-header">
        <h1>Auditoría</h1>
      </div>

      <div class="admin-toolbar">
        <select id="filtro-evento" class="form-input">
          <option value="">Todos los eventos</option>
          <option value="org_registered">org_registered</option>
          <option value="session_created">session_created</option>
          <option value="session_completed">session_completed</option>
          <option value="otp_sent">otp_sent</option>
          <option value="otp_verified">otp_verified</option>
        </select>
        <input type="date" id="filtro-fecha" class="form-input">
      </div>

      <div class="card overflow-x-auto">
        <table class="tabla">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Evento</th>
              <th>Organización</th>
              <th>Datos</th>
              <th>IP</th>
            </tr>
          </thead>
          <tbody id="audit-tbody">
            <tr><td colspan="5" class="admin-empty">Cargando...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="admin-toolbar flex-between mt-md">
        <span id="paginacion-info" class="text-sm text-muted"></span>
        <div class="flex-gap-sm">
          <button id="btn-anterior" class="btn btn-outline btn-sm" disabled>Anterior</button>
          <button id="btn-siguiente" class="btn btn-outline btn-sm">Siguiente</button>
        </div>
      </div>
    </main>

  <footer class="pie-app">
    <p>Consen<em>tia</em> &mdash; Consentimiento informado y firma electr&oacute;nica</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/supabase-client.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin-guard.js"></script>
  <script src="../../js/admin-nav.js"></script>
  <script src="../../js/app-header.js"></script>
  <script src="../../js/admin-audit.js"></script>
</body>
</html>
