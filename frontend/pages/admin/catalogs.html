<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catálogos | Consentia Admin</title>
  <link rel="stylesheet" href="../../css/tokens.css">
  <link rel="stylesheet" href="../../css/componentes.css">
</head>
<body class="pagina-app">
  <a href="#main" class="skip-link">Ir al contenido</a>
  <div class="marca-barra"></div>
  <header id="app-header" class="app-header"></header>
  <nav id="admin-tabs" class="admin-tabs"></nav>

    <main id="main" class="admin-content">
      <div class="admin-header">
        <button id="btn-nuevo-tipo" class="btn btn-primary" hidden>Nuevo tipo</button>
      </div>

      <div class="card overflow-x-auto">
        <table class="tabla">
          <thead>
            <tr>
              <th>Código</th>
              <th>Nombre</th>
              <th>Contextos</th>
              <th>Regex</th>
              <th>Estado</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="catalog-tbody">
            <tr><td colspan="6" class="admin-empty">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </main>

  <!-- Modal editar/crear tipo de documento -->
  <div id="modal-edit-catalog" class="modal-overlay" onclick="if(event.target===this)close_catalog_modal()">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Tipo de documento</h3>
        <button class="modal-close" onclick="close_catalog_modal()">&times;</button>
      </div>
      <div class="form-group">
        <label class="form-label" for="edit-code">Código</label>
        <input type="text" id="edit-code" class="form-input" placeholder="CC">
      </div>
      <div class="form-group">
        <label class="form-label" for="edit-label">Nombre</label>
        <input type="text" id="edit-label" class="form-input" placeholder="Cédula de Ciudadanía">
      </div>
      <div class="form-group">
        <label class="form-label">Contextos</label>
        <div class="admin-perm-grid">
          <label class="admin-perm-item"><input type="checkbox" class="ctx-check" value="natural"> natural</label>
          <label class="admin-perm-item"><input type="checkbox" class="ctx-check" value="natural_represented"> representado</label>
          <label class="admin-perm-item"><input type="checkbox" class="ctx-check" value="natural_representative"> representante</label>
          <label class="admin-perm-item"><input type="checkbox" class="ctx-check" value="juridica_signer"> jurídica firmante</label>
          <label class="admin-perm-item"><input type="checkbox" class="ctx-check" value="juridica_entity"> jurídica (entidad)</label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="edit-regex">Regex de validación</label>
        <input type="text" id="edit-regex" class="form-input text-mono" placeholder="^\d{6,10}$">
      </div>
      <div class="form-row-2col">
        <div class="form-group">
          <label class="form-label" for="edit-sort-order">Orden</label>
          <input type="number" id="edit-sort-order" class="form-input" value="0">
        </div>
        <div class="form-group">
          <label class="form-label mt-lg">
            <input type="checkbox" id="edit-active" checked class="check-teal"> Activo
          </label>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-outline" onclick="close_catalog_modal()">Cancelar</button>
        <button id="btn-save-catalog" class="btn btn-primary" onclick="save_doc_type()">Guardar</button>
      </div>
    </div>
  </div>

  <footer class="pie-app">
    <p>Consen<em>tia</em> | Consentimiento informado y firma electr&oacute;nica | by CARDAVIL</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/supabase-client.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin-guard.js"></script>
  <script src="../../js/admin-nav.js"></script>
  <script src="../../js/app-header.js"></script>
  <script src="../../js/admin-catalogs.js"></script>
</body>
</html>
